<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Genesis Voice AI Demo</title>
    <style>
        body {
            background: #0a0f1c;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .phone {
            background: #11161f;
            border-radius: 48px;
            padding: 20px;
            width: 360px;
            max-width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .screen {
            background: #000;
            border-radius: 32px;
            padding: 20px;
            height: 260px;
            overflow-y: auto;
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .log-line {
            margin: 8px 0;
            border-left: 2px solid #0f0;
            padding-left: 10px;
        }
        .log-line.user {
            border-left-color: #88f;
            color: #ccf;
        }
        button {
            background: #2c3e4e;
            border: none;
            color: white;
            font-size: 1.2rem;
            padding: 12px 24px;
            border-radius: 40px;
            margin: 5px;
            cursor: pointer;
        }
        #call {
            background: #1e7e34;
        }
        #hangup {
            background: #9e2a2a;
        }
        button:disabled {
            opacity: 0.5;
        }
        .status {
            text-align: center;
            color: #aaa;
            margin-top: 15px;
            font-size: 13px;
        }
    </style>
    <!-- ReconnectingWebSocket to allow custom headers -->
    <script src="https://unpkg.com/reconnecting-websocket@4.4.0/dist/reconnecting-websocket.min.js"></script>
</head>
<body>
<div class="phone">
    <div class="screen" id="logScreen">
        <div class="log-line">⚡ Genesis AI Receptionist ready</div>
        <div class="log-line">🎤 Click "Call" and allow microphone</div>
    </div>
    <div style="text-align:center;">
        <button id="call">📞 Call</button>
        <button id="hangup" disabled>❌ Hang up</button>
    </div>
    <div class="status" id="status">● Disconnected</div>
</div>

<script>
    // This will be replaced later with your actual Codespace WebSocket URL
    const BACKEND_WS_URL = 'wss://https://humble-yodel-wgqvxx9wqrjfv99x-3000.app.github.dev/';

    let ws = null;
    let mediaStream = null;
    let audioContext = null;
    let source = null;
    let processor = null;

    const logScreen = document.getElementById('logScreen');
    const statusDiv = document.getElementById('status');
    const callBtn = document.getElementById('call');
    const hangupBtn = document.getElementById('hangup');

    function addLog(text, isUser = false) {
        const div = document.createElement('div');
        div.className = `log-line ${isUser ? 'user' : ''}`;
        div.innerHTML = `${isUser ? '🗣️ You: ' : '🤖 AI: '}${text}`;
        logScreen.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth' });
    }

    function cleanup() {
        if (processor) processor.disconnect();
        if (source) source.disconnect();
        if (audioContext) audioContext.close();
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        if (ws) ws.close();
        ws = null;
        callBtn.disabled = false;
        hangupBtn.disabled = true;
        statusDiv.innerText = '● Disconnected';
    }

    async function startCall() {
        cleanup();
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            source = audioContext.createMediaStreamSource(mediaStream);

            // Create ReconnectingWebSocket with User-Agent header (required by some hosts)
            ws = new ReconnectingWebSocket(BACKEND_WS_URL, [], {
                maxReconnectAttempts: 5,
                maxReconnectInterval: 3000,
                connectionTimeout: 10000,
                constructor: function(url, protocols, options) {
                    options.headers = {
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                    };
                    return new WebSocket(url, protocols);
                }
            });
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                statusDiv.innerText = '● Connected – speak now';
                callBtn.disabled = true;
                hangupBtn.disabled = false;
                addLog('Call active. Speak into your microphone.', false);

                processor = audioContext.createScriptProcessor(4096, 1, 1);
                processor.onaudioprocess = (e) => {
                    const input = e.inputBuffer.getChannelData(0);
                    const pcm16 = new Int16Array(input.length);
                    for (let i = 0; i < input.length; i++) {
                        pcm16[i] = input[i] * 0x7FFF;
                    }
                    const pcmBytes = new Uint8Array(pcm16.buffer);
                    let binary = '';
                    for (let i = 0; i < pcmBytes.length; i++) {
                        binary += String.fromCharCode(pcmBytes[i]);
                    }
                    const base64 = btoa(binary);
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(base64);
                    }
                };
                source.connect(processor);
                processor.connect(audioContext.destination);
            };

            ws.onmessage = (event) => {
                const pcmData = new Uint8Array(event.data);
                const float32 = new Float32Array(pcmData.length);
                for (let i = 0; i < pcmData.length; i++) {
                    float32[i] = (pcmData[i] - 128) / 128;
                }
                const buffer = audioContext.createBuffer(1, float32.length, 16000);
                buffer.copyToChannel(float32, 0);
                const source = audioContext.createBufferSource();
                source.buffer = buffer;
                source.connect(audioContext.destination);
                source.start();
            };

            ws.onclose = () => {
                if (statusDiv.innerText !== '● Disconnected') {
                    addLog('Call ended.', false);
                    cleanup();
                }
            };
        } catch (err) {
            console.error(err);
            addLog(`Microphone error: ${err.message}`, false);
            statusDiv.innerText = '❌ Microphone not available';
            cleanup();
        }
    }

    callBtn.addEventListener('click', startCall);
    hangupBtn.addEventListener('click', () => {
        if (ws) ws.close();
        cleanup();
    });
</script>
</body>
</html>
